<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver-Ion Battery Swapping Simulation</title>
    <style>
        :root {
            --ev-color: #3498db;
            --silver: linear-gradient(145deg, #bdc3c7, #2c3e50);
            --station-color: #ecf0f1;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Header & Comparison Panel */
        header {
            text-align: center;
            padding: 20px;
        }

        .ui-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-card {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .comparison {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-weight: bold;
        }

        .check { color: var(--success); }
        .cross { color: var(--danger); }

        /* Simulation Stage */
        #stage {
            position: relative;
            width: 800px;
            height: 400px;
            background-color: #fff;
            border-radius: 20px;
            border: 4px solid #ddd;
            overflow: hidden;
        }

        .road {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: #333;
            border-top: 5px solid #555;
        }

        /* Swapping Station */
        .station {
            position: absolute;
            left: 300px;
            bottom: 100px;
            width: 250px;
            height: 200px;
            background: var(--station-color);
            border-radius: 10px 10px 0 0;
            border: 2px solid #bdc3c7;
        }

        .rack {
            position: absolute;
            right: 10px;
            top: 20px;
            width: 60px;
            height: 150px;
            border: 2px dashed #95a5a6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }

        .rack-label {
            position: absolute;
            top: -40px;
            font-size: 12px;
            width: 100px;
            color: #7f8c8d;
        }

        /* Robotic Arm */
        #arm {
            position: absolute;
            left: 350px;
            bottom: 140px;
            width: 10px;
            height: 50px;
            background: #2c3e50;
            transition: all 0.8s ease-in-out;
            z-index: 5;
        }

        #gripper {
            position: absolute;
            bottom: -10px;
            left: -15px;
            width: 40px;
            height: 10px;
            background: #2c3e50;
        }

        /* Electric Vehicle */
        #ev {
            position: absolute;
            bottom: 105px;
            left: -150px;
            width: 120px;
            height: 60px;
            background: var(--ev-color);
            border-radius: 15px 40px 10px 10px;
            transition: left 2s linear;
            z-index: 10;
        }

        .wheel {
            position: absolute;
            bottom: -10px;
            width: 25px;
            height: 25px;
            background: #000;
            border-radius: 50%;
            border: 3px solid #7f8c8d;
        }

        /* Battery Style */
        .battery {
            width: 30px;
            height: 15px;
            background: var(--silver);
            border: 1px solid #7f8c8d;
            border-radius: 2px;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.5);
            position: absolute;
        }

        .depleted { filter: grayscale(1) opacity(0.5); }

        /* Overlay Text */
        #status-msg {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }

        #timer-pop {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            color: var(--success);
            display: none;
        }

        /* Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            background-color: var(--ev-color);
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }

        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; }
    </style>
</head>
<body>

<header>
    <h1>Silver-Ion Battery Swapping</h1>
    <p>The future of Zero-Wait Electric Vehicles</p>
</header>

<div class="ui-container">
    <div class="info-card comparison">
        <div>🔄 Swapping: 3 Mins <span class="check">✔</span></div>
        <div style="font-size: 0.8em; color: #7f8c8d;">Traditional: 45+ Mins <span class="cross">✘</span></div>
    </div>
    <div class="info-card">
        <div id="step-desc">Ready to start</div>
    </div>
</div>

<div id="stage">
    <div id="status-msg">⚡ System Ready</div>
    <div id="timer-pop">3:00</div>
    
    <div class="road"></div>
    
    <div class="station">
        <div class="rack">
            <div class="rack-label">Charging Cabinet<br>(Drivers don't wait)</div>
            <div id="spare-battery" class="battery"></div>
        </div>
    </div>

    <div id="arm">
        <div id="gripper"></div>
    </div>

    <div id="ev">
        <div class="wheel" style="left: 10px;"></div>
        <div class="wheel" style="right: 15px;"></div>
        <div id="car-battery" class="battery depleted" style="bottom: 0; left: 45px;"></div>
    </div>
</div>

<div class="controls">
    <button id="playBtn" onclick="startSimulation()">Start Simulation</button>
    <label>Speed:</label>
    <input type="range" id="speedScale" min="0.5" max="2" step="0.1" value="1">
</div>

<script>
    const ev = document.getElementById('ev');
    const arm = document.getElementById('arm');
    const carBat = document.getElementById('car-battery');
    const spareBat = document.getElementById('spare-battery');
    const stepDesc = document.getElementById('step-desc');
    const statusMsg = document.getElementById('status-msg');
    const timerPop = document.getElementById('timer-pop');
    const playBtn = document.getElementById('playBtn');

    function wait(ms) {
        const scale = document.getElementById('speedScale').value;
        return new Promise(resolve => setTimeout(resolve, ms / scale));
    }

    async function startSimulation() {
        playBtn.disabled = true;
        
        // Reset positions
        ev.style.transition = 'left 2s linear';
        ev.style.left = '-150px';
        carBat.className = 'battery depleted';
        spareBat.style.display = 'block';
        timerPop.style.display = 'none';
        
        await wait(500);

        // Step 1: Drive In
        stepDesc.innerText = "Step 1: EV arrives at station";
        statusMsg.innerText = "⚡ Vehicle Detected";
        ev.style.left = '320px';
        await wait(2200);

        // Step 2: Remove Depleted Battery
        stepDesc.innerText = "Step 2: Robotic arm removes empty battery";
        arm.style.height = '100px'; 
        await wait(1000);
        
        // Grab and pull up
        carBat.style.bottom = '100px'; // Visual trick to 'attach' to arm
        arm.style.height = '40px';
        await wait(1000);

        // Move to rack
        arm.style.left = '515px';
        await wait(1000);
        
        // Drop in rack
        arm.style.height = '120px';
        await wait(800);
        const oldBat = carBat.cloneNode(true);
        document.querySelector('.rack').appendChild(oldBat);
        oldBat.style.position = 'relative';
        oldBat.style.bottom = '0';
        oldBat.style.left = '0';
        carBat.style.display = 'none';
        arm.style.height = '40px';
        await wait(800);

        // Step 3: Get Fresh Battery
        stepDesc.innerText = "Step 3: Inserting fresh Silver-Ion battery";
        arm.style.left = '515px';
        spareBat.style.display = 'none';
        const activeBat = spareBat.cloneNode(true);
        activeBat.style.display = 'block';
        arm.appendChild(activeBat);
        activeBat.style.bottom = '-15px';
        activeBat.style.left = '-10px';
        
        await wait(500);
        arm.style.left = '350px'; // Back to car
        await wait(1000);
        arm.style.height = '100px';
        await wait(800);

        // Release to car
        activeBat.style.display = 'none';
        carBat.className = 'battery'; // Fresh silver
        carBat.style.display = 'block';
        carBat.style.bottom = '0';
        arm.style.height = '40px';
        await wait(1000);

        // Step 4: Drive Away
        stepDesc.innerText = "Step 4: Done! Total time: 3 Minutes";
        timerPop.style.display = 'block';
        statusMsg.innerText = "⚡ 100% Charged";
        
        await wait(1000);
        ev.style.left = '1000px';
        await wait(2000);

        stepDesc.innerText = "Simulation Complete";
        playBtn.disabled = false;
        playBtn.innerText = "Replay Simulation";
    }
</script>

</body>
</html>
